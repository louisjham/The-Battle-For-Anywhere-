class Sandbox {
    constructor() {
        this.osmData = null;
        this.centerLat = 40.7128;
        this.centerLng = -74.0060;
        this.isLoading = false;

        this.setupRenderer();
        this.setupScene();
        this.setupCamera();
        this.setupControls();
        this.setupLighting();
        this.setupBuilders();
        this.setupUI();
        this.setupEvents();
        this.animate();

        // load default location
        this.loadWorld(this.centerLat, this.centerLng);
    }

    setupRenderer() {
        this.renderer = new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
        this.renderer.setSize(window.innerWidth,window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
        this.renderer.shadowMap.enabled=true;
        this.renderer.shadowMap.type=THREE.PCFSoftShadowMap;
        this.renderer.outputEncoding=THREE.sRGBEncoding;
        this.renderer.toneMapping=THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure=1.0;
        document.getElementById('canvas-container').appendChild(this.renderer.domElement);
    }

    setupScene() {
        this.scene=new THREE.Scene();
        this.scene.background=new THREE.Color(CONFIG.style.skyColor);
        this.scene.fog=new THREE.Fog(CONFIG.style.fogColor,CONFIG.style.fogNear,CONFIG.style.fogFar);
        this.worldGroup=new THREE.Group();
        this.scene.add(this.worldGroup);
    }

    setupCamera() {
        this.camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,5000);
        this.camera.position.set(0,300,300);
        this.camera.lookAt(0,0,0);
    }

    setupControls() {
        this.controls=new THREE.OrbitControls(this.camera,this.renderer.domElement);
        this.controls.enableDamping=true;
        this.controls.dampingFactor=0.05;
        this.controls.minDistance=20;
        this.controls.maxDistance=1500;
        this.controls.maxPolarAngle=Math.PI/2.1;
    }

    setupLighting() {
        this.ambientLight=new THREE.AmbientLight(CONFIG.style.ambientColor,CONFIG.style.ambientIntensity);
        this.scene.add(this.ambientLight);

        this.dirLight=new THREE.DirectionalLight(CONFIG.style.directionalColor,CONFIG.style.directionalIntensity);
        this.dirLight.position.set(200,400,200);
        this.dirLight.castShadow=true;
        this.dirLight.shadow.mapSize.width=2048;
        this.dirLight.shadow.mapSize.height=2048;
        this.dirLight.shadow.camera.near=0.5;
        this.dirLight.shadow.camera.far=1500;
        this.dirLight.shadow.camera.left=-600;
        this.dirLight.shadow.camera.right=600;
        this.dirLight.shadow.camera.top=600;
        this.dirLight.shadow.camera.bottom=-600;
        this.scene.add(this.dirLight);

        this.accent1=new THREE.PointLight(CONFIG.style.accentColor,CONFIG.style.accentIntensity,300);
        this.accent1.position.set(-100,80,-100);
        this.scene.add(this.accent1);

        this.accent2=new THREE.PointLight(CONFIG.style.accentColor,CONFIG.style.accentIntensity*0.7,300);
        this.accent2.position.set(100,60,100);
        this.scene.add(this.accent2);
    }

    setupBuilders() {
        this.buildingBuilder = new BuildingBuilder(this.worldGroup);
        this.roadBuilder     = new RoadBuilder(this.worldGroup);
        this.poiBuilder      = new POIBuilder(this.worldGroup);
        this.unitManager     = new UnitManager(this.worldGroup);
    }

    // ---- LOAD WORLD ----
    async loadWorld(lat, lng) {
        if(this.isLoading) return;
        this.isLoading = true;
        showLoading(true);
        setProgress(5,'Connecting to OpenStreetMap...');

        try {
            setProgress(15,'Fetching map data...');
            const raw = await fetchOSMData(lat, lng, CONFIG.world.radius);

            setProgress(45,'Parsing geography...');
            const data = parseOSMData(raw, lat, lng);
            this.osmData = data;

            setProgress(55,'Clearing old world...');
            this.clearWorld();

            setProgress(65,'Building ground...');
            this.buildGround();

            setProgress(72,'Placing buildings...');
            this.buildingBuilder.build(data.buildings);

            setProgress(85,'Drawing roads...');
            this.roadBuilder.build(data.roads);

            setProgress(93,'Placing strategic points...');
            this.poiBuilder.build(data.pois);

            setProgress(96,'Placing emitters...');
            this.unitManager.build(data.pois);

            setProgress(100,'World ready!');
            setTimeout(()=>showLoading(false), 600);

            setStatus(
                `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}  |  ` +
                `🏢 ${data.buildings.length} buildings  |  ` +
                `🛣️ ${data.roads.length} roads  |  ` +
                `⚔️ ${data.pois.length} points of interest`
            );

        } catch(err) {
            console.error(err);
            showLoading(false);
            showError('Failed to load map data. Overpass API may be busy — wait 30 seconds and try again. ' + err.message);
            setStatus('❌ Load failed — see error above');
        }

        this.isLoading = false;
    }

    clearWorld() {
        this.buildingBuilder.clear();
        this.roadBuilder.clear();
        this.poiBuilder.clear();
        this.unitManager.clear();
        // remove ground
        if(this.groundMesh){ this.worldGroup.remove(this.groundMesh); this.groundMesh=null; }
        if(this.gridMesh){   this.worldGroup.remove(this.gridMesh);   this.gridMesh=null;   }
    }

    buildGround() {
        // Create a procedural grid texture for the ground
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        // Base color
        ctx.fillStyle = CONFIG.style.groundColor;
        ctx.fillRect(0, 0, 512, 512);
        
        // Grid lines
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 2;
        
        // Small grid
        for(let i=0; i<=512; i+=32) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(512, i); ctx.stroke();
        }
        
        // Large grid
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 4;
        for(let i=0; i<=512; i+=128) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(512, i); ctx.stroke();
        }

        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        // Repeat the texture many times across the large ground plane
        tex.repeat.set(CONFIG.world.groundSize / 50, CONFIG.world.groundSize / 50);

        const geo=new THREE.PlaneGeometry(CONFIG.world.groundSize,CONFIG.world.groundSize);
        const mat=new THREE.MeshLambertMaterial({
            color: 0xffffff, // Use white so the canvas texture colors show through
            map: tex
        });
        
        this.groundMesh=new THREE.Mesh(geo,mat);
        this.groundMesh.rotation.x=-Math.PI/2;
        this.groundMesh.receiveShadow=true;
        this.worldGroup.add(this.groundMesh);

        // We can remove the old GridHelper since we have a textured grid now
        // this.gridMesh=new THREE.GridHelper(CONFIG.world.groundSize,100,0x1a2a3a,0x0d1520);
        // this.gridMesh.position.y=0.1;
        // this.worldGroup.add(this.gridMesh);
    }

    // ---- TWEAKPANE UI ----
    setupUI() {
        const isMobile = window.innerWidth <= 768;
        this.pane=new Tweakpane.Pane({title:'🎨 World Sandbox',expanded:!isMobile});

        // AI Textures
        const aif = this.pane.addFolder({title:'✨ AI Textures',expanded:false});
        CONFIG.ai = { imageSize: '1K' };
        aif.addInput(CONFIG.ai, 'imageSize', {
            options: { '1K': '1K', '2K': '2K', '4K': '4K' },
            label: 'Resolution'
        });
        aif.addButton({title:'Generate Ground Texture'}).on('click', () => this.generateAIGroundTexture());
        aif.addButton({title:'Generate Building Textures'}).on('click', () => this.generateAIBuildingTextures());

        // World
        const wf=this.pane.addFolder({title:'🌍 World',expanded:false});
        wf.addInput(CONFIG.world,'radius',{min:200,max:2000,step:100,label:'Radius (m)'});
        wf.addInput(CONFIG.world,'buildingHeightScale',{min:0.1,max:5,step:0.1,label:'Bldg Height'})
          .on('change',()=>{ this.buildingBuilder.clear(); this.buildingBuilder.build(this.osmData?.buildings||[]); });
        wf.addInput(CONFIG.world,'roadWidth',{min:0.5,max:8,step:0.5,label:'Road Width'})
          .on('change',()=>{ this.roadBuilder.clear(); this.roadBuilder.build(this.osmData?.roads||[]); });

        // Sky
        const sf=this.pane.addFolder({title:'🌌 Sky & Fog',expanded:false});
        sf.addInput(CONFIG.style,'skyColor',{label:'Sky'})
          .on('change',ev=>{ this.scene.background.set(ev.value); });
        sf.addInput(CONFIG.style,'fogColor',{label:'Fog Color'})
          .on('change',ev=>{ this.scene.fog.color.set(ev.value); });
        sf.addInput(CONFIG.style,'fogNear',{min:50,max:800,step:10,label:'Fog Near'})
          .on('change',()=>{ this.scene.fog.near=CONFIG.style.fogNear; });
        sf.addInput(CONFIG.style,'fogFar',{min:200,max:2000,step:10,label:'Fog Far'})
          .on('change',()=>{ this.scene.fog.far=CONFIG.style.fogFar; });

        // Ground
        const gf=this.pane.addFolder({title:'🌱 Ground',expanded:false});
        gf.addInput(CONFIG.style,'groundColor',{label:'Color'})
            .on('change',()=>{ 
                // Rebuild ground to update the canvas texture color
                if(this.groundMesh) {
                    this.worldGroup.remove(this.groundMesh);
                    this.groundMesh.geometry.dispose();
                    this.groundMesh.material.map.dispose();
                    this.groundMesh.material.dispose();
                }
                this.buildGround(); 
            });

        // Lighting
        const lf=this.pane.addFolder({title:'💡 Lighting',expanded:false});
        lf.addInput(CONFIG.style,'ambientIntensity',{min:0,max:2,step:0.05,label:'Ambient'})
          .on('change',()=>{ this.ambientLight.intensity=CONFIG.style.ambientIntensity; });
        lf.addInput(CONFIG.style,'ambientColor',{label:'Ambient Color'})
          .on('change',ev=>{ this.ambientLight.color.set(ev.value); });
        lf.addInput(CONFIG.style,'directionalIntensity',{min:0,max:3,step:0.05,label:'Sun/Moon'})
          .on('change',()=>{ this.dirLight.intensity=CONFIG.style.directionalIntensity; });
        lf.addInput(CONFIG.style,'directionalColor',{label:'Sun/Moon Color'})
          .on('change',ev=>{ this.dirLight.color.set(ev.value); });
        lf.addInput(CONFIG.style,'accentColor',{label:'Accent Color'})
          .on('change',ev=>{ this.accent1.color.set(ev.value); this.accent2.color.set(ev.value); });
        lf.addInput(CONFIG.style,'accentIntensity',{min:0,max:5,step:0.1,label:'Accent Intensity'})
          .on('change',()=>{ this.accent1.intensity=CONFIG.style.accentIntensity; this.accent2.intensity=CONFIG.style.accentIntensity*0.7; });

        // POIs
        const pf=this.pane.addFolder({title:'⚔️ Strategic Points',expanded:false});
        pf.addInput(CONFIG.style,'poiColor',{label:'Color'})
          .on('change',()=>{ if(this.poiBuilder.mat){ this.poiBuilder.mat.color.set(CONFIG.style.poiColor); this.poiBuilder.mat.emissive.set(CONFIG.style.poiColor); } });
        pf.addInput(CONFIG.style,'poiGlowIntensity',{min:0,max:5,step:0.1,label:'Glow'})
          .on('change',()=>{ this.poiBuilder.lights.forEach(l=>{ l.intensity=CONFIG.style.poiGlowIntensity; }); });

        // Presets
        const pref=this.pane.addFolder({title:'🎭 Presets',expanded:true});
        pref.addButton({title:'🌑 Dark Tactical'}).on('click',()=>this.applyPreset('darkTactical'));
        pref.addButton({title:'🌿 Ancient World'}).on('click',()=>this.applyPreset('ancientWorld'));
        pref.addButton({title:'⚡ Neon City'}).on('click',()=>this.applyPreset('neonCity'));
        pref.addButton({title:'🏔️ Stone & Iron'}).on('click',()=>this.applyPreset('stoneIron'));
    }

    applyPreset(name) {
        const presets = {
            darkTactical:{
                skyColor:'#0a0e1a',fogColor:'#0a0e1a',groundColor:'#1a2233',
                buildingColor:'#2a3a5c',buildingEmissive:'#0a1020',roadColor:'#0d1526',
                ambientColor:'#334466',directionalColor:'#aabbff',
                accentColor:'#4a9eff',poiColor:'#ff6b35'
            },
            ancientWorld:{
                skyColor:'#2d1b00',fogColor:'#3d2b10',groundColor:'#3d2b10',
                buildingColor:'#8b6914',buildingEmissive:'#3d2500',roadColor:'#5c3d00',
                ambientColor:'#664422',directionalColor:'#ffcc77',
                accentColor:'#ff8833',poiColor:'#ffcc00'
            },
            neonCity:{
                skyColor:'#050010',fogColor:'#050010',groundColor:'#0a0015',
                buildingColor:'#1a0a2e',buildingEmissive:'#0a0020',roadColor:'#050010',
                ambientColor:'#220033',directionalColor:'#ff00ff',
                accentColor:'#00ffff',poiColor:'#ff00ff'
            },
            stoneIron:{
                skyColor:'#1a1a20',fogColor:'#1a1a20',groundColor:'#2a2a30',
                buildingColor:'#4a4a55',buildingEmissive:'#1a1a20',roadColor:'#1a1a25',
                ambientColor:'#333340',directionalColor:'#ccccdd',
                accentColor:'#aaaacc',poiColor:'#cc4444'
            }
        };
        const p=presets[name];
        if(!p) return;
        Object.assign(CONFIG.style,p);
        this.scene.background.set(p.skyColor);
        this.scene.fog.color.set(p.fogColor);
        if(this.groundMesh) this.groundMesh.material.color.set(p.groundColor);
        this.ambientLight.color.set(p.ambientColor);
        this.dirLight.color.set(p.directionalColor);
        this.accent1.color.set(p.accentColor);
        this.accent2.color.set(p.accentColor);
        if(this.poiBuilder.mat){
            this.poiBuilder.mat.color.set(p.poiColor);
            this.poiBuilder.mat.emissive.set(p.poiColor);
        }
        this.pane.refresh();
    }

    // ---- AI TEXTURE GENERATION ----
    async ensureApiKey() {
        if (window.aistudio && window.aistudio.hasSelectedApiKey) {
            const hasKey = await window.aistudio.hasSelectedApiKey();
            if (!hasKey) {
                await window.aistudio.openSelectKey();
            }
        }
    }

    async generateAIGroundTexture() {
        if (this.isGeneratingAI) return;
        this.isGeneratingAI = true;
        try {
            await this.ensureApiKey();
            showLoading(true);
            setProgress(10, 'Prompting Nano Banana Pro for ground texture...');
            
            const apiKey = process.env.API_KEY || process.env.GEMINI_API_KEY;
            const ai = new GoogleGenAI({ apiKey: apiKey });
            const response = await ai.models.generateContent({
                model: 'gemini-3-pro-image-preview',
                contents: {
                    parts: [{ text: "A seamless top-down texture of realistic concrete and asphalt ground, tactical map style, high quality, architectural rendering" }]
                },
                config: {
                    imageConfig: {
                        aspectRatio: "1:1",
                        imageSize: CONFIG.ai.imageSize
                    }
                }
            });
            
            setProgress(80, 'Applying texture...');
            let b64 = null;
            for (const part of response.candidates[0].content.parts) {
                if (part.inlineData) {
                    b64 = `data:image/png;base64,${part.inlineData.data}`;
                    break;
                }
            }
            
            if (!b64) throw new Error("No image generated");
            
            const img = new Image();
            img.src = b64;
            img.onload = () => {
                const tex = new THREE.Texture(img);
                tex.needsUpdate = true;
                tex.wrapS = THREE.RepeatWrapping;
                tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(CONFIG.world.groundSize / 100, CONFIG.world.groundSize / 100);
                
                if (this.groundMesh) {
                    if (this.groundMesh.material.map) this.groundMesh.material.map.dispose();
                    this.groundMesh.material.map = tex;
                    this.groundMesh.material.color.setHex(0xffffff);
                    this.groundMesh.material.needsUpdate = true;
                }
                showLoading(false);
                this.isGeneratingAI = false;
            };
        } catch (err) {
            console.error(err);
            showLoading(false);
            
            const errMsg = err.message || "";
            if (errMsg.includes("Requested entity was not found") || errMsg.includes("PERMISSION_DENIED") || errMsg.includes("403")) {
                showError("Please select a PAID API key. Free keys do not have access to Nano Banana Pro.");
                if (window.aistudio && window.aistudio.openSelectKey) {
                    window.aistudio.openSelectKey();
                }
            } else {
                showError("AI Generation failed: " + errMsg);
            }
            this.isGeneratingAI = false;
        }
    }

    async generateAIBuildingTextures() {
        if (this.isGeneratingAI) return;
        this.isGeneratingAI = true;
        try {
            await this.ensureApiKey();
            showLoading(true);
            setProgress(10, 'Prompting Nano Banana Pro for building textures...');
            
            const apiKey = process.env.API_KEY || process.env.GEMINI_API_KEY;
            const ai = new GoogleGenAI({ apiKey: apiKey });
            
            const response = await ai.models.generateContent({
                model: 'gemini-3-pro-image-preview',
                contents: {
                    parts: [{ text: "A seamless texture of a modern building facade, flat lighting, realistic, architectural photography, high quality windows and concrete" }]
                },
                config: {
                    imageConfig: {
                        aspectRatio: "1:1",
                        imageSize: CONFIG.ai.imageSize
                    }
                }
            });
            
            setProgress(80, 'Applying texture...');
            let b64 = null;
            for (const part of response.candidates[0].content.parts) {
                if (part.inlineData) {
                    b64 = `data:image/png;base64,${part.inlineData.data}`;
                    break;
                }
            }
            
            if (!b64) throw new Error("No image generated");
            
            const img = new Image();
            img.src = b64;
            img.onload = () => {
                const tex = new THREE.Texture(img);
                tex.needsUpdate = true;
                
                // Override the TextureGen to return this texture for everything
                this.buildingBuilder.texGen.get = function(type, floors) {
                    const clonedTex = tex.clone();
                    clonedTex.needsUpdate = true;
                    clonedTex.wrapS = THREE.RepeatWrapping;
                    clonedTex.wrapT = THREE.RepeatWrapping;
                    return clonedTex;
                };
                
                // Rebuild buildings
                this.buildingBuilder.clear();
                this.buildingBuilder.build(this.osmData?.buildings || []);
                
                showLoading(false);
                this.isGeneratingAI = false;
            };
        } catch (err) {
            console.error(err);
            showLoading(false);
            
            const errMsg = err.message || "";
            if (errMsg.includes("Requested entity was not found") || errMsg.includes("PERMISSION_DENIED") || errMsg.includes("403")) {
                showError("Please select a PAID API key. Free keys do not have access to Nano Banana Pro.");
                if (window.aistudio && window.aistudio.openSelectKey) {
                    window.aistudio.openSelectKey();
                }
            } else {
                showError("AI Generation failed: " + errMsg);
            }
            this.isGeneratingAI = false;
        }
    }

    // ---- EVENTS ----
    setupEvents() {
        // Load button
        document.getElementById('load-btn').addEventListener('click', () => {
            const val = document.getElementById('location-input').value.trim();
            const parts = val.split(',');
            if(parts.length !== 2) { showError('Enter coordinates as: lat,lng'); return; }
            const lat = parseFloat(parts[0].trim());
            const lng = parseFloat(parts[1].trim());
            if(isNaN(lat)||isNaN(lng)) { showError('Invalid coordinates'); return; }
            if(lat<-90||lat>90)  { showError('Latitude must be between -90 and 90'); return; }
            if(lng<-180||lng>180){ showError('Longitude must be between -180 and 180'); return; }
            this.centerLat=lat;
            this.centerLng=lng;
            this.loadWorld(lat,lng);
        });

        // Enter key
        document.getElementById('location-input').addEventListener('keydown', e => {
            if(e.key==='Enter') document.getElementById('load-btn').click();
        });

        // GPS button
        document.getElementById('gps-btn').addEventListener('click', () => {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                return;
            }
            const btn = document.getElementById('gps-btn');
            btn.textContent = '⏳';
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    btn.textContent = '📍';
                    const lat = position.coords.latitude.toFixed(5);
                    const lng = position.coords.longitude.toFixed(5);
                    document.getElementById('location-input').value = `${lat},${lng}`;
                    document.getElementById('load-btn').click();
                },
                (error) => {
                    btn.textContent = '📍';
                    showError('Unable to retrieve your location: ' + error.message);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        // Export
        document.getElementById('export-btn').addEventListener('click', () => {
            const json=JSON.stringify(CONFIG,null,2);
            const blob=new Blob([json],{type:'application/json'});
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url; a.download='world-config.json'; a.click();
            URL.revokeObjectURL(url);
        });

        // Resize
        window.addEventListener('resize', () => {
            this.camera.aspect=window.innerWidth/window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth,window.innerHeight);
        });
    }

    // ---- RENDER LOOP ----
    animate() {
        requestAnimationFrame(()=>this.animate());
        
        const now = performance.now();
        const dt = this.lastTime ? (now - this.lastTime) / 1000 : 0.016;
        this.lastTime = now;

        this.controls.update();
        this.poiBuilder.update();
        this.unitManager.update(dt);
        this.renderer.render(this.scene,this.camera);
    }
}

    if(typeof THREE === 'undefined') {
        document.body.innerHTML = '<p style="color:red;padding:20px;">Three.js failed to load. Check your internet connection.</p>';
        return;
    }
    if(typeof Tweakpane === 'undefined') {
        document.body.innerHTML = '<p style="color:red;padding:20px;">Tweakpane failed to load. Check your internet connection.</p>';
        return;
    }
    window.sandbox = new Sandbox();
});
